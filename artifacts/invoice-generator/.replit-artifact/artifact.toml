kind = "web"
previewPath = "/"
title = "Invoice Generator"
version = "1.0.0"
id = "artifacts/invoice-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22293

[services.development]
run = "pnpm --filter @workspace/invoice-generator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/invoice-generator", "run", "build" ]
publicDir = "artifacts/invoice-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22293"
BASE_PATH = "/"
